model_name_or_path: Qwen/Qwen2.5-0.5B-Instruct
adapter_name_or_path: ./outputs/personal_lora_cpt

# Qwen2.5 系列用的是 chatml 风格模板，这里用 LlamaFactory 里的 "qwen"
template: qwen
