### model
# 把这里换成你真正要训练的基座模型（本地路径或 HF 模型名）
model_name_or_path: Qwen/Qwen2.5-0.5B-Instruct
trust_remote_code: true

### method
stage: pt
do_train: true
finetuning_type: lora
lora_rank: 16
lora_target: all

### dataset
# 先生成个人数据集：
#   python tools/prepare_personal_dataset.py --input_dir raw --output_dir personal_data --mode cpt --dataset_name personal_cpt
dataset: personal_cpt
dataset_dir: ./personal_data
cutoff_len: 2048
max_samples: 5000
preprocessing_num_workers: 4
dataloader_num_workers: 0

### output
output_dir: ./outputs/personal_lora_cpt
logging_steps: 10
save_steps: 200
plot_loss: true
overwrite_output_dir: true
save_only_model: true
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true

### misc
seed: 42

